<style>
:root{
  --bg-blue:#061247;
  --front-purple:#561386;
  --it-red:#8C0327;
}

body{
  background:var(--bg-blue);
  font-family:system-ui;
  margin:0;
  padding:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* CARD */
.card{
  width:90vw;
  max-width:380px;
  height:40vw;
  max-height:180px;
  background:white;
  border:4px solid var(--it-red);
  border-radius:1rem;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0.8rem;
  text-align:center;
}

.question-text{
  font-weight:800;
  text-transform:uppercase;
  font-size:clamp(0.95rem, 2.8vw, 1.1rem);
  color:var(--front-purple);
  line-height:1.3;
}

/* HEADER */
.answers-header{
  width:90vw;
  max-width:380px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  margin-top:8px;
  margin-bottom:4px;
}

#counter{
  color:white;
  font-weight:800;
  font-size:0.95rem;
}

#score{
  color:#FFD700;
  font-weight:800;
  font-size:0.95rem;
  text-align:right;
}

.next-btn{
  background:#00cfd5;
  color:#061247;
  font-weight:800;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  height:28px;
  padding:0 12px;

}

/* SOUND BUTTON */
.sound-btn{

  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  height:28px;
  padding:0 12px;
  font-size:0.8rem;
}

/* ANSWERS GRID */
.answers{

  max-width:380px;
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:12px;
}

/* BUTTONS */
.answer-btn{
  width:100%;
  min-height:50px;
  background:#eef2f7;
  color:var(--front-purple);
  font-weight:700;
  border-radius:10px;
  border:1px solid #cbd5e1;

  display:flex;
  align-items:center;
  justify-content:flex-start;
  text-align:left;

  padding:10px 12px;
  font-size:0.95rem;
  line-height:1.3;

  white-space: normal;
  word-break: break-word;

  transition: transform 0.08s ease, background 0.12s ease;
}

.answer-btn:active{
  transform: scale(0.94);
  background:#dbe3ec;
}

.next-btn{
  transition: transform 0.1s ease;
}

.next-btn:active{
  transform: scale(0.95);
}

.correct{
  background:#22c55e;
  color:white;
  box-shadow:0 0 10px #22c55e;
  transform:scale(1.05);
}

.wrong{
  background:#ef4444;
  color:white;
}

/* RETRY BUTTON */
.retry-btn{
  all:unset;
  background:var(--front-purple);
  color:white;
  font-weight:800;
  border-radius:8px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:8px 18px;
  font-size:0.9rem;

  margin-top:12px;
}

.retry-btn:active{

}

/* SHUFFLE (FISHER-YATES) */
function shuffle(arr){
  let newArr = [...arr];

  for(let i = newArr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
  }

  return newArr;
}

let quiz = [];
let index = 0;
let score = 0;

/* START QUIZ */
function startQuiz(){

  quiz = shuffle([...questions]).slice(0,15);

  index = 0;
  score = 0;

  document.getElementById("answers").style.display = "flex";
  document.getElementById("nextBtn").style.display = "flex";
  document.getElementById("retryContainer").innerHTML = "";

  showQuestion();
}

/* SHOW QUESTION */
function showQuestion(){
  const q = quiz[index];

  const cleanQuestion = q.question
    .replace(/^\d+\)\s*/, "")
    .replace(/\.$/, "");

  document.getElementById("question").innerText = cleanQuestion;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.options.forEach((opt,i)=>{
    const btn = document.createElement("button");

    const letters = ["a)","b)","c)","d)"];
    btn.innerHTML = `<span style="color: var(--it-red); font-weight:800; display:inline-block; width:28px;">${letters[i]}</span>${opt}`;

    btn.className = "answer-btn";

    btn.onclick = ()=>checkAnswer(i, q.answer);

    answersDiv.appendChild(btn);
  });

  document.getElementById("nextBtn").disabled = true;

  updateScore();
}

/* CHECK ANSWER */
function checkAnswer(selected, correct){
  const buttons = document.querySelectorAll(".answer-btn");

  const correctSound = document.getElementById("correctSound");
  const wrongSound = document.getElementById("wrongSound");

  buttons.forEach((b,i)=>{
    if(i === correct) b.classList.add("correct");
    if(i === selected && selected !== correct) b.classList.add("wrong");
    b.disabled = true;
  });

  if(selected === correct){
    score++;
    playSound(correctSound);
  } else {
    playSound(wrongSound);
  }

  document.getElementById("nextBtn").disabled = false;
}

/* UPDATE SCORE */
function updateScore(){
  document.getElementById("score").innerText =
    `${score} / ${quiz.length}`;

  document.getElementById("counter").innerText =
    `${index + 1} / ${quiz.length}`;
}

/* END QUIZ */
function endQuiz(){
  const percent = (score / quiz.length) * 100;

  const passSound = document.getElementById("passSound");
  const failSound = document.getElementById("failSound");

  if(percent >= 70){
    document.getElementById("question").innerText =
      "WELL DONE! YOU'VE PASSED! 🎉";
    playSound(passSound);
  } else {
    document.getElementById("question").innerText =
      "BAD LUCK! TRY AGAIN ❌";
    playSound(failSound);
  }

  document.getElementById("answers").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";

  document.getElementById("retryContainer").innerHTML =
    `<button class="retry-btn">TRY AGAIN</button>`;

  document.querySelector(".retry-btn").onclick = startQuiz;
}

/* NEXT BUTTON */
document.getElementById("nextBtn").onclick = function(){
  if(index === quiz.length - 1){
    endQuiz();
    return;
  }
  index++;
  showQuestion();
};

/* INIT */
startQuiz();
