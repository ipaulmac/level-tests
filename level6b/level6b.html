/* SHUFFLE (FISHER-YATES) */
function shuffle(arr){
  let newArr = [...arr];

  for(let i = newArr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
  }

  return newArr;
}

let quiz = [];
let index = 0;
let score = 0;

/* START QUIZ */
function startQuiz(){

  quiz = shuffle([...questions]).slice(0,15);

  index = 0;
  score = 0;

  document.getElementById("answers").style.display = "flex";
  document.getElementById("nextBtn").style.display = "flex";
  document.getElementById("retryContainer").innerHTML = "";

  showQuestion();
}

/* SHOW QUESTION */
function showQuestion(){
  const q = quiz[index];

  const cleanQuestion = q.question
    .replace(/^\d+\)\s*/, "")
    .replace(/\.$/, "");

  document.getElementById("question").innerText = cleanQuestion;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.options.forEach((opt,i)=>{
    const btn = document.createElement("button");

    const letters = ["a)","b)","c)","d)"];
    btn.innerHTML = `<span style="color: var(--it-red); font-weight:800; display:inline-block; width:28px;">${letters[i]}</span>${opt}`;

    btn.className = "answer-btn";

    btn.onclick = ()=>checkAnswer(i, q.answer);

    answersDiv.appendChild(btn);
  });

  document.getElementById("nextBtn").disabled = true;

  updateScore();
}

/* CHECK ANSWER */
function checkAnswer(selected, correct){
  const buttons = document.querySelectorAll(".answer-btn");

  const correctSound = document.getElementById("correctSound");
  const wrongSound = document.getElementById("wrongSound");

  buttons.forEach((b,i)=>{
    if(i === correct) b.classList.add("correct");
    if(i === selected && selected !== correct) b.classList.add("wrong");
    b.disabled = true;
  });

  if(selected === correct){
    score++;
    playSound(correctSound);
  } else {
    playSound(wrongSound);
  }

  document.getElementById("nextBtn").disabled = false;
}

/* UPDATE SCORE */
function updateScore(){
  document.getElementById("score").innerText =
    `${score} / ${quiz.length}`;

  document.getElementById("counter").innerText =
    `${index + 1} / ${quiz.length}`;
}

/* END QUIZ */
function endQuiz(){
  const percent = (score / quiz.length) * 100;

  const passSound = document.getElementById("passSound");
  const failSound = document.getElementById("failSound");

  if(percent >= 70){
    document.getElementById("question").innerText =
      "WELL DONE! YOU'VE PASSED! 🎉";
    playSound(passSound);
  } else {
    document.getElementById("question").innerText =
      "BAD LUCK! TRY AGAIN ❌";
    playSound(failSound);
  }

  document.getElementById("answers").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";

  document.getElementById("retryContainer").innerHTML =
    `<button class="retry-btn">TRY AGAIN</button>`;

  document.querySelector(".retry-btn").onclick = startQuiz;
}

/* NEXT BUTTON */
document.getElementById("nextBtn").onclick = function(){
  if(index === quiz.length - 1){
    endQuiz();
    return;
  }
  index++;
  showQuestion();
};

/* INIT */
startQuiz();
