let quiz = [];
let lastQuiz = []; // 🔥 remembers previous test
let index = 0;
let score = 0;

/* SHUFFLE (FISHER-YATES) */
function shuffle(arr){
  let newArr = [...arr];

  for(let i = newArr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
  }

  return newArr;
}

/* START QUIZ */
function startQuiz(){

  let pool = [...questions];

  // 🔥 remove previous quiz questions
  if(lastQuiz.length > 0){
    pool = pool.filter(q => !lastQuiz.includes(q));
  }

  // 🔁 reset if not enough questions left
  if(pool.length < 15){
    pool = [...questions];
  }

  quiz = shuffle(pool).slice(0,15);

  // 🔥 save current quiz for next round
  lastQuiz = [...quiz];

  index = 0;
  score = 0;

  // SHOW ANSWERS + NEXT AGAIN
  document.getElementById("answers").style.display = "grid";
  document.getElementById("nextBtn").style.display = "flex";

  // CLEAR RETRY BUTTON
  document.getElementById("retryContainer").innerHTML = "";

  showQuestion();
}

/* SHOW QUESTION */
function showQuestion(){
  const q = quiz[index];

  const cleanQuestion = q.question
    .replace(/^\d+\)\s*/, "")
    .replace(/\./g, "");

  document.getElementById("question").innerText = cleanQuestion;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.options.forEach((opt,i)=>{
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.className = "answer-btn";

    btn.onclick = ()=>checkAnswer(i, q.answer);

    answersDiv.appendChild(btn);
  });

  document.getElementById("nextBtn").disabled = true;

  updateScore();
}

/* CHECK ANSWER */
function checkAnswer(selected, correct){
  const buttons = document.querySelectorAll(".answer-btn");

  const correctSound = document.getElementById("correctSound");
  const wrongSound = document.getElementById("wrongSound");

  buttons.forEach((b,i)=>{
    if(i === correct) b.classList.add("correct");
    if(i === selected && selected !== correct) b.classList.add("wrong");
    b.disabled = true;
  });

  if(selected === correct){
    score++;
    playSound(correctSound);
  } else {
    playSound(wrongSound);
  }

  document.getElementById("nextBtn").disabled = false;
}

/* UPDATE SCORE */
function updateScore(){
  document.getElementById("score").innerText =
    `${score} / ${quiz.length}`;

  document.getElementById("counter").innerText =
    `${index + 1} / ${quiz.length}`;
}

/* END QUIZ */
function endQuiz(){
  const percent = (score / quiz.length) * 100;

  const passSound = document.getElementById("passSound");
  const failSound = document.getElementById("failSound");

  if(percent >= 70){
    document.getElementById("question").innerText =
      "WELL DONE! YOU'VE PASSED! 🎉";
    playSound(passSound);
  } else {
    document.getElementById("question").innerText =
      "BAD LUCK! TRY AGAIN ❌";
    playSound(failSound);
  }

  // HIDE ANSWERS + NEXT
  document.getElementById("answers").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";

  // SHOW RETRY BUTTON
  document.getElementById("retryContainer").innerHTML =
    `<button class="retry-btn">TRY AGAIN</button>`;

  document.querySelector(".retry-btn").onclick = startQuiz;
}

/* NEXT BUTTON */
document.getElementById("nextBtn").onclick = function(){
  if(index === quiz.length - 1){
    endQuiz();
    return;
  }
  index++;
  showQuestion();
};

/* INIT */
